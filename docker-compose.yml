version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: product-management-redis
    restart: unless-stopped

    ports:
      - "6380:6379"

    volumes:
      - redis-data:/data

  product-dashboard-api:
    image: webvory/product-management-backend:latest
    container_name: product-management-backend
    restart: unless-stopped

    depends_on:
      - redis

    ports:
      - "9000:8000"

    env_file:
      - .env

    volumes:
      - ./data:/app/data
      - ./data.db:/app/data.db          # <-- Add this line
      - ./service_account.json:/app/service_account.json:ro
      - ./credentials.json:/app/credentials.json:ro
      - ./token.json:/app/token.json:ro

volumes:
  redis-data:
